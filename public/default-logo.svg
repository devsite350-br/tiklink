<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" width="560" height="240" role="img" aria-label="Tik Link">
  <defs>
    <linearGradient id="tlGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37ad8d"/>
      <stop offset="1" stop-color="#2f8f74"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="556" height="236" rx="28" fill="#f7f7f3"/>

  <!-- Monogram: navy T interlocked with a green L -->
  <g>
    <!-- T top bar -->
    <rect x="36" y="44" width="116" height="30" rx="13" fill="#22394f"/>
    <!-- T stem -->
    <rect x="79" y="44" width="30" height="118" rx="13" fill="#22394f"/>
    <!-- L vertical (green) -->
    <rect x="120" y="74" width="30" height="88" rx="13" fill="url(#tlGreen)"/>
    <!-- L foot (green) -->
    <rect x="79" y="158" width="92" height="30" rx="13" fill="url(#tlGreen)"/>
  </g>

  <!-- Wordmark -->
  <text x="206" y="120" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="82" font-weight="700">
    <tspan fill="#22394f">Tik</tspan><tspan fill="url(#tlGreen)"> Link</tspan>
  </text>

  <!-- Hebrew tagline with side rules -->
  <line x1="292" y1="166" x2="322" y2="166" stroke="#2f8f74" stroke-width="3" stroke-linecap="round"/>
  <line x1="498" y1="166" x2="528" y2="166" stroke="#2f8f74" stroke-width="3" stroke-linecap="round"/>
  <text x="410" y="174" text-anchor="middle" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="25" font-weight="500" fill="#5d6a6a" direction="rtl">ניהול תיק לקוח חכם</text>
</svg>
